name: Lighthouse CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Lab CWV against production (HTTPS). Local Next + Clerk placeholders made
# Chromium hit chrome-error:// interstitials (CHROME_INTERSTITIAL_ERROR).
# Build correctness stays covered by workflow "CI".
jobs:
  lighthouse:
    name: Core Web Vitals (lab)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
