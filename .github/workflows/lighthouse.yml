name: Lighthouse CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lighthouse:
    name: Core Web Vitals (lab)
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost/placeholder?sslmode=require"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_must_replace_in_production_00
      CLERK_SECRET_KEY: sk_test_placeholder_must_replace_in_production_00000000
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Start production server
        run: npm run start &

      - name: Wait for Next.js
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 > /dev/null && echo "Ready after ${i}s" && exit 0
            sleep 1
          done
          echo "::error::Next.js did not become ready in 30s" && exit 1

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
