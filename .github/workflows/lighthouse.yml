name: Lighthouse CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lighthouse:
    name: Core Web Vitals (lab)
    runs-on: ubuntu-latest
    env:
      SKIP_ENV_VALIDATION: "1"
      DATABASE_URL: "postgresql://placeholder:placeholder@localhost/placeholder?sslmode=require"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder_must_replace_in_production_00
      CLERK_SECRET_KEY: sk_test_placeholder_must_replace_in_production_00000000
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: /sign-in
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: /sign-up
      NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: /dashboard
      NEXT_PUBLIC_CLERK_AFTER_SIGN_UP_URL: /dashboard
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Start production server
        run: |
          npm run start > /tmp/next-start.log 2>&1 &
          echo $! > /tmp/next-start.pid

      - name: Wait for Next.js
        run: |
          # Do not use curl -f: homepage may return 5xx with placeholder Clerk/DB
          # while the server is still listening (force-dynamic). Probe a static asset.
          for i in $(seq 1 90); do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 5 http://localhost:3000/offline || echo "000")
            if [ "$code" = "200" ]; then
              echo "Ready after ${i}s (offline HTTP $code)"
              exit 0
            fi
            sleep 1
          done
          echo "::error::Next.js did not become ready in 90s"
          echo "::group::sample homepage response"
          curl -sS -D - --max-time 10 http://localhost:3000/ -o /tmp/home-body.txt || true
          head -c 2000 /tmp/home-body.txt || true
          echo
          echo "::endgroup::"
          echo "::group::next start log"
          cat /tmp/next-start.log || true
          echo "::endgroup::"
          exit 1

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
